name: jammy-profiles-service pipeline

on: [ push, pull_request ]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # STEP 1: LINT & STATIC ANALYSIS
      - name: Code Quality (Spotless)
        run: ./mvnw spotless:check

      # STEP 2: UNIT TESTS
      - name: Run Unit Tests
        run: ./mvnw test

      # STEP 3: INTEGRATION TESTS (The Postgres stuff)
      - name: Run Integration Tests
        run: ./mvnw verify -DskipUnitTests -Dquarkus.hibernate-orm.database.generation=none

#      # STEP 4: PACKAGE (Store the result)
#      - name: Package Application
#        run: ./mvnw package -DskipTests

      # STEP 4: ARTIFACT UPLOAD (Зберігаємо результат збирання)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-app
          path: target/quarkus-app/
